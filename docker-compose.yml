services:
  backend:
    build:
      context: ./backend
    container_name: vertiche-backend
    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - postgres
      - redis

    volumes:
      - ./backend:/app
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: vertiche-frontend
    ports:
      - "5173:80"

    environment:
      VITE_API_URL: http://localhost:8000

    depends_on:
      - backend
    networks:
      - app-network

  postgres:
    image: postgres:16
    container_name: vertiche-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vertiche

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: vertiche-redis
    ports:
      - "6379:6379"
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
